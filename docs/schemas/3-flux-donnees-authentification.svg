<svg width="680" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Flux de données et d'authentification</title>
<desc>Cycle de vie : connexion par code vérifié côté serveur, hydratation initiale du store, puis synchronisation bidirectionnelle continue avec polling toutes les 15 secondes.</desc>
<style>
text{font-family:'Helvetica Neue',Arial,sans-serif}
.t{font-size:14px;font-weight:500;fill:#2C2C2A}
.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.ts{font-size:12px;font-weight:400;fill:#5F5E5A}
.c-purple{fill:#EEEDFE;stroke:#534AB7}
.c-teal{fill:#E1F5EE;stroke:#0F6E56}
.c-coral{fill:#FAECE7;stroke:#993C1D}
.c-amber{fill:#FAEEDA;stroke:#854F0B}
.c-gray{fill:#F1EFE8;stroke:#5F5E5A}
</style>
<defs>
<marker id="a3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5F5E5A"/></marker>
<marker id="a3b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#185FA5"/></marker>
</defs>
<rect x="0" y="0" width="680" height="560" fill="#ffffff"/>

<text class="th" x="40" y="34">1 — Connexion</text>

<g class="c-purple"><rect x="40" y="48" width="180" height="58" rx="8"/></g>
<text class="t" x="130" y="72" text-anchor="middle">Saisie code 4 chiffres</text>
<text class="ts" x="130" y="90" text-anchor="middle">ou biométrie</text>

<g class="c-coral"><rect x="250" y="48" width="190" height="58" rx="8"/></g>
<text class="t" x="345" y="72" text-anchor="middle">signIn (Server Action)</text>
<text class="ts" x="345" y="90" text-anchor="middle">vérifie le code en base</text>

<g class="c-amber"><rect x="470" y="48" width="170" height="58" rx="8"/></g>
<text class="t" x="555" y="72" text-anchor="middle">Cookie HMAC</text>
<text class="ts" x="555" y="90" text-anchor="middle">httpOnly · 30 jours</text>

<line x1="220" y1="77" x2="246" y2="77" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a3)"/>
<line x1="440" y1="77" x2="466" y2="77" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a3)"/>

<line x1="40" y1="130" x2="640" y2="130" stroke="#D3D1C7" stroke-width="1"/>

<text class="th" x="40" y="162">2 — Hydratation initiale</text>

<g class="c-purple"><rect x="40" y="176" width="180" height="58" rx="8"/></g>
<text class="t" x="130" y="200" text-anchor="middle">Store Zustand</text>
<text class="ts" x="130" y="218" text-anchor="middle">hydrate() au montage</text>

<g class="c-coral"><rect x="250" y="176" width="190" height="58" rx="8"/></g>
<text class="t" x="345" y="200" text-anchor="middle">loadData()</text>
<text class="ts" x="345" y="218" text-anchor="middle">lit les 8 tables</text>

<g class="c-teal"><rect x="470" y="176" width="170" height="58" rx="8"/></g>
<text class="t" x="555" y="200" text-anchor="middle">Supabase</text>
<text class="ts" x="555" y="218" text-anchor="middle">renvoie les données</text>

<line x1="220" y1="205" x2="246" y2="205" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a3)"/>
<line x1="466" y1="218" x2="226" y2="232" stroke="#185FA5" stroke-width="1.5" marker-end="url(#a3b)"/>
<text class="ts" x="345" y="252" text-anchor="middle" fill="#185FA5">codes de connexion retirés avant envoi au navigateur</text>

<line x1="40" y1="272" x2="640" y2="272" stroke="#D3D1C7" stroke-width="1"/>

<text class="th" x="40" y="304">3 — Synchronisation continue</text>

<g class="c-purple"><rect x="40" y="320" width="240" height="100" rx="8"/></g>
<text class="t" x="160" y="346" text-anchor="middle">Store (état UI)</text>
<text class="ts" x="160" y="368" text-anchor="middle">chaque modification locale</text>
<text class="ts" x="160" y="386" text-anchor="middle">est persistée automatiquement</text>
<text class="ts" x="160" y="404" text-anchor="middle">polling refresh toutes les 15 s</text>

<g class="c-teal"><rect x="400" y="320" width="240" height="100" rx="8"/></g>
<text class="t" x="520" y="346" text-anchor="middle">Supabase</text>
<text class="ts" x="520" y="368" text-anchor="middle">source de vérité partagée</text>
<text class="ts" x="520" y="386" text-anchor="middle">entre tous les utilisateurs</text>

<line x1="280" y1="356" x2="396" y2="356" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a3)"/>
<text class="ts" x="338" y="348" text-anchor="middle">persistUpsert</text>
<line x1="396" y1="392" x2="280" y2="392" stroke="#185FA5" stroke-width="1.5" marker-end="url(#a3b)"/>
<text class="ts" x="338" y="412" text-anchor="middle" fill="#185FA5">refresh</text>

<g class="c-gray"><rect x="40" y="448" width="600" height="74" rx="8"/></g>
<text class="t" x="340" y="476" text-anchor="middle">Mode démo (sans Supabase configuré)</text>
<text class="ts" x="340" y="498" text-anchor="middle">données en mémoire, remises à zéro au rechargement — pour tester sans backend</text>
</svg>