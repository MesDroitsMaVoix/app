<svg width="680" viewBox="0 0 680 530" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Pipeline de déploiement</title>
<desc>Un git push sur GitHub déclenche un build et déploiement automatique sur Vercel, qui sert l'app aux utilisateurs et communique avec Supabase via des variables d'environnement.</desc>
<style>
text{font-family:'Helvetica Neue',Arial,sans-serif}
.t{font-size:14px;font-weight:500;fill:#2C2C2A}
.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.ts{font-size:12px;font-weight:400;fill:#5F5E5A}
.c-purple{fill:#EEEDFE;stroke:#534AB7}
.c-teal{fill:#E1F5EE;stroke:#0F6E56}
.c-coral{fill:#FAECE7;stroke:#993C1D}
.c-amber{fill:#FAEEDA;stroke:#854F0B}
.c-blue{fill:#E6F1FB;stroke:#185FA5}
.c-gray{fill:#F1EFE8;stroke:#5F5E5A}
</style>
<defs>
<marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5F5E5A"/></marker>
</defs>
<rect x="0" y="0" width="680" height="530" fill="#ffffff"/>

<g class="c-gray"><rect x="40" y="48" width="170" height="64" rx="8"/></g>
<text class="t" x="125" y="76" text-anchor="middle">Développeur</text>
<text class="ts" x="125" y="94" text-anchor="middle">git push</text>

<g class="c-purple"><rect x="255" y="48" width="170" height="64" rx="8"/></g>
<text class="t" x="340" y="76" text-anchor="middle">GitHub</text>
<text class="ts" x="340" y="94" text-anchor="middle">dépôt source</text>

<g class="c-gray"><rect x="470" y="48" width="170" height="64" rx="8"/></g>
<text class="t" x="555" y="76" text-anchor="middle">Utilisateurs ESAT</text>
<text class="ts" x="555" y="94" text-anchor="middle">mobile · tablette · PC</text>

<line x1="210" y1="80" x2="251" y2="80" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a2)"/>

<line x1="340" y1="112" x2="340" y2="150" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a2)"/>
<text class="ts" x="352" y="135" text-anchor="start">webhook déclenche le build</text>

<text class="th" x="40" y="180">Vercel — hébergement &amp; CI/CD</text>
<rect x="40" y="192" width="600" height="150" rx="10" fill="none" stroke="#888780" stroke-dasharray="4 4"/>

<g class="c-coral"><rect x="58" y="212" width="172" height="56" rx="8"/></g>
<text class="t" x="144" y="236" text-anchor="middle">Build Next.js</text>
<text class="ts" x="144" y="254" text-anchor="middle">next build automatique</text>

<g class="c-coral"><rect x="254" y="212" width="172" height="56" rx="8"/></g>
<text class="t" x="340" y="236" text-anchor="middle">Edge / Serverless</text>
<text class="ts" x="340" y="254" text-anchor="middle">Server Actions + SSR</text>

<g class="c-coral"><rect x="450" y="212" width="172" height="56" rx="8"/></g>
<text class="t" x="536" y="236" text-anchor="middle">CDN global</text>
<text class="ts" x="536" y="254" text-anchor="middle">assets statiques + PWA</text>

<g class="c-amber"><rect x="58" y="284" width="564" height="42" rx="8"/></g>
<text class="t" x="340" y="305" text-anchor="middle">Variables d'environnement (chiffrées)</text>
<text class="ts" x="340" y="320" text-anchor="middle">NEXT_PUBLIC_SUPABASE_URL · SUPABASE_SERVICE_ROLE_KEY (secrète)</text>

<line x1="230" y1="240" x2="252" y2="240" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a2)"/>
<line x1="426" y1="240" x2="448" y2="240" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a2)"/>

<line x1="555" y1="192" x2="555" y2="114" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a2)"/>
<text class="ts" x="567" y="158" text-anchor="start">sert l'app (HTTPS)</text>

<line x1="340" y1="342" x2="340" y2="392" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a2)"/>
<text class="ts" x="352" y="372" text-anchor="start">REST sécurisé (service_role)</text>

<text class="th" x="40" y="420">Supabase — backend managé (palier gratuit)</text>
<rect x="40" y="432" width="600" height="78" rx="10" fill="none" stroke="#888780" stroke-dasharray="4 4"/>

<g class="c-teal"><rect x="58" y="452" width="280" height="44" rx="8"/></g>
<text class="t" x="198" y="479" text-anchor="middle">Base Postgres (8 tables jsonb)</text>

<g class="c-blue"><rect x="350" y="452" width="272" height="44" rx="8"/></g>
<text class="t" x="486" y="479" text-anchor="middle">Storage — bucket attachments</text>
</svg>